events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- Gzip compression ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    # ---- Rate limiting ----
    # Define a shared memory zone for rate limiting:
    # 10MB zone can track ~160,000 IPs
    limit_req_zone $binary_remote_addr zone=url_shortener_limit:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ---- Upstream Flask app ----
    upstream url_shortener_backend {
        # Docker Compose: use service name
        # For sidecar pattern (same pod), use localhost
        server app:8000 max_fails=3 fail_timeout=30s;
    }

    # ---- Main server block ----
    server {
        listen 80 default_server;
        server_name _;

        # ---- Security headers ----
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ---- Client max body size ----
        client_max_body_size 10M;

        # ---- Rate limiting ----
        limit_req zone=url_shortener_limit burst=20 nodelay;
        limit_conn addr 10;
        limit_conn_status 429;

        # ---- Proxy to Flask app ----
        location / {
            proxy_pass http://url_shortener_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size   4k;
            proxy_buffers       8 4k;
            proxy_busy_buffers_size 8k;
        }

        # ---- Health check endpoint (no rate limit) ----
        location /api/health {
            access_log off;
            proxy_pass http://url_shortener_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ---- Deny access to hidden files ----
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ---- Error pages ----
        error_page 429 /429.html;
        location = /429.html {
            internal;
            default_type application/json;
            return 429 '{"error":"Too Many Requests","message":"Rate limit exceeded. Please try again later."}';
        }

        error_page 502 503 504 /50x.html;
        location = /50x.html {
            internal;
            default_type application/json;
            return 502 '{"error":"Upstream Unavailable","message":"The service is temporarily unavailable."}';
        }
    }
}
