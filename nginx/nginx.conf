events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- Gzip compression ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    # ---- Rate limiting ----
    limit_req_zone $binary_remote_addr zone=url_shortener_limit:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ---- Upstream Flask app ----
    upstream url_shortener_backend {
        server url-shortener-app:8000 max_fails=3 fail_timeout=30s;
    }

    # ---- HTTP server (serves behind Cloudflare proxy & direct) ----
    server {
        listen 80 default_server;
        server_name aminghuf.dev www.aminghuf.dev _;

        # ACME challenge
        location ^~ /.well-known/ {
            root /var/www;
            allow all;
        }

        # Proxy to Flask
        location / {
            proxy_pass http://url_shortener_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            proxy_buffering on;
            proxy_buffer_size   4k;
            proxy_buffers       8 4k;
            proxy_busy_buffers_size 8k;
        }

        # Health check
        location /api/health {
            access_log off;
            proxy_pass http://url_shortener_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Deny hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Error pages
        error_page 429 /429.html;
        location = /429.html {
            internal;
            default_type application/json;
            return 429 '{"error":"Too Many Requests","message":"Rate limit exceeded. Please try again later."}';
        }
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            internal;
            default_type application/json;
            return 502 '{"error":"Upstream Unavailable","message":"The service is temporarily unavailable."}';
        }
    }

    # ---- HTTPS server (direct access) ----
    server {
        listen 443 ssl http2;
        server_name aminghuf.dev www.aminghuf.dev;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        client_max_body_size 10M;

        limit_req zone=url_shortener_limit burst=20 nodelay;
        limit_conn addr 10;
        limit_conn_status 429;

        location / {
            proxy_pass http://url_shortener_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }

        location /api/health {
            access_log off;
            proxy_pass http://url_shortener_backend;
        }

        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        error_page 429 /429.html;
        location = /429.html {
            internal;
            default_type application/json;
            return 429 '{"error":"Too Many Requests","message":"Rate limit exceeded."}';
        }
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            internal;
            default_type application/json;
            return 502 '{"error":"Service Unavailable"}';
        }
    }
}
