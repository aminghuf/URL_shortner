# HorizontalPodAutoscaler: automatically scales the app based on CPU usage
#
# How it works:
#   - Keeps replicas between 2 and 6
#   - If average CPU across all pods exceeds 50%, adds more replicas
#   - If CPU drops back down, removes replicas (waits 5 min before scaling down)

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: app-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: app
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50   # scale up when CPU exceeds 50%
