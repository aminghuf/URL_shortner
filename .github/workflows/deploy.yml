name: Test, Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:  # allows manual trigger from GitHub UI

env:
  DOCKER_HUB_IMAGE: aminghazizadeh/url-shortener

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Run tests
  # ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v
        # Tests use SQLite by default (no DATABASE_URL set)
        # Redis is optional — the app handles it gracefully

  # ──────────────────────────────────────────────
  # Job 2: Build Docker image, push, and deploy
  # ──────────────────────────────────────────────
  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: success()  # only runs if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Docker Hub login ──
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # ── Build & push app image ──
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_HUB_IMAGE }}:latest
            ${{ env.DOCKER_HUB_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Deploy to Kubernetes ──
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "stable"

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Apply manifests
        run: kubectl apply -f k8s/

      - name: Update image
        run: |
          kubectl set image deployment/app app=${{ env.DOCKER_HUB_IMAGE }}:${{ github.sha }}
          kubectl rollout status deployment/app --timeout=120s

      # ── Verify external access ──
      - name: Smoke test
        if: always()
        run: |
          sleep 5
          curl -sf https://aminghuf.dev/health || echo "⚠️  External check failed (Cloudflare may be caching)"
