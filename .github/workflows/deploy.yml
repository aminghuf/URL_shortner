name: Test, Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:  # allows manual trigger from GitHub UI

env:
  DOCKER_HUB_IMAGE: aminghazizadeh/url-shortener
  DEPLOY_PATH: /root/url_shortner

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Run tests
  # ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v
        # Tests use SQLite by default (no DATABASE_URL set)
        # Redis is optional — the app handles it gracefully

  # ──────────────────────────────────────────────
  # Job 2: Build Docker image, push, and deploy
  # ──────────────────────────────────────────────
  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: success()  # only runs if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Docker Hub login ──
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # ── Build & push app image ──
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_HUB_IMAGE }}:latest
            ${{ env.DOCKER_HUB_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Deploy to VPS ──
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT || 22 }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            echo "📦 Pulling latest code..."
            cd ${{ env.DEPLOY_PATH }}
            git pull origin main

            echo "🐳 Pulling latest Docker image..."
            docker pull ${{ env.DOCKER_HUB_IMAGE }}:latest

            echo "🔄 Restarting services..."
            docker compose \
              -f docker-compose.prod.yml \
              up -d --remove-orphans

            echo "🧹 Cleaning up old images..."
            docker image prune -af --filter "until=24h"

            echo "🏥 Health check..."
            sleep 3
            curl -sf http://localhost:8000/api/health && echo "✅ App healthy" || echo "⚠️  Health check failed"

      # ── Verify external access ──
      - name: Smoke test
        if: always()
        run: |
          sleep 5
          curl -sf https://aminghuf.dev/health || echo "⚠️  External check failed (Cloudflare may be caching)"
