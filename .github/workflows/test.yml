name: Run Tests

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest

      - name: Build Docker image
        run: |
          docker build -t url-shortener:test .

  # Self-hosted webhook on the production server handles actual deployment
  # Webhook endpoint: http://116.203.200.35:9999/webhook
  # Triggers: git pull, docker-compose build, docker-compose up -d
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger deployment via webhook
        run: |
          curl -s -X POST http://116.203.200.35:9999/webhook \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -d '{"ref": "refs/heads/main"}'
